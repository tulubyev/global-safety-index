gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name worldsafetyindex.org www.worldsafetyindex.org;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name worldsafetyindex.org www.worldsafetyindex.org;

    ssl_certificate     /etc/letsencrypt/live/worldsafetyindex.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worldsafetyindex.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_cache_bypass $http_upgrade;

    # Backend API
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Next.js frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }
}
